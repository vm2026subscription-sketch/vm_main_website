<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Admin — Upload E-Paper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    :root {
      --orange:#ff6600; --navy:#003d6b;
      --paper:#fdfaf5; --border:#e2d9cc;
      --ink:#1a1a2e; --muted:#7a7a8a;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);}

    /* ── Login overlay ── */
    #loginOverlay{
      position:fixed;inset:0;background:rgba(0,0,0,.5);
      display:flex;align-items:center;justify-content:center;z-index:999;
    }
    #loginOverlay.hidden{display:none;}
    .login-card{
      background:#fff;border-radius:16px;padding:36px 32px;
      width:360px;box-shadow:0 8px 40px rgba(0,0,0,.2);
    }
    .login-card h2{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:24px;text-align:center;}
    .login-card .form-group{margin-bottom:16px;}
    .login-card label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;
                      letter-spacing:.8px;display:block;margin-bottom:6px;}
    .login-card input{width:100%;padding:10px 12px;border:1.5px solid var(--border);
                      border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;
                      outline:none;transition:border-color .2s;}
    .login-card input:focus{border-color:var(--orange);}
    .login-card .btn-login{width:100%;padding:12px;background:var(--orange);color:#fff;
                           border:none;border-radius:10px;font-family:'DM Sans',sans-serif;
                           font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .2s;}
    .login-card .btn-login:hover{background:#e55a00;}
    .login-card .btn-login:disabled{background:#ccc;cursor:not-allowed;}
    .login-err{font-size:12px;color:#dc2626;text-align:center;margin-top:10px;display:none;}

    /* ── Header ── */
    header{background:var(--navy);padding:20px 32px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
    header h1{font-family:'Playfair Display',serif;color:#fff;font-size:22px;}
    .api-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);
               border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:4px 10px;
               font-size:11px;color:rgba(255,255,255,.75);}
    .api-badge .dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0;}
    #userChip{display:none;align-items:center;gap:8px;margin-left:auto;}
    #userChip span{color:rgba(255,255,255,.8);font-size:13px;}
    #logoutBtn{padding:5px 14px;border:1px solid rgba(255,255,255,.3);border-radius:6px;
               background:transparent;color:rgba(255,255,255,.8);font-family:'DM Sans',sans-serif;
               font-size:12px;cursor:pointer;transition:all .2s;}
    #logoutBtn:hover{background:rgba(255,255,255,.1);color:#fff;}
    header a{color:rgba(255,255,255,.6);font-size:13px;text-decoration:none;}
    header a:hover{color:#fff;}

    /* ── Main content ── */
    .wrap{max-width:820px;margin:40px auto;padding:0 24px;}
    .card{background:#fff;border:1px solid var(--border);border-radius:16px;
          padding:32px;margin-bottom:32px;box-shadow:0 4px 20px rgba(0,0,0,.06);}
    .card h2{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:24px;}

    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
    .form-group{display:flex;flex-direction:column;gap:6px;}
    .form-group label{font-size:12px;font-weight:600;color:var(--muted);
                      text-transform:uppercase;letter-spacing:.8px;}
    .form-group input,
    .form-group select{padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;
                       font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
    .form-group input:focus,
    .form-group select:focus{border-color:var(--orange);}

    .drop-zone{border:2px dashed var(--border);border-radius:12px;padding:40px;
               text-align:center;cursor:pointer;transition:all .2s;margin-bottom:20px;}
    .drop-zone:hover,.drop-zone.over{border-color:var(--orange);background:rgba(255,102,0,.04);}
    .drop-zone i{font-size:36px;color:var(--muted);margin-bottom:12px;display:block;}
    .drop-zone p{font-size:14px;color:var(--muted);}
    .drop-zone span{color:var(--orange);font-weight:600;}
    .drop-zone input[type=file]{display:none;}
    #fileName{margin-top:10px;font-size:13px;color:var(--ink);font-weight:500;}

    .btn-submit{width:100%;padding:14px;background:var(--orange);color:#fff;border:none;
                border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;
                cursor:pointer;transition:background .2s;display:flex;align-items:center;
                justify-content:center;gap:10px;}
    .btn-submit:hover{background:#e55a00;}
    .btn-submit:disabled{background:#ccc;cursor:not-allowed;}

    .progress-wrap{display:none;margin-top:16px;}
    .progress-bar{height:6px;background:var(--border);border-radius:4px;overflow:hidden;}
    .progress-fill{height:100%;width:0%;background:var(--orange);transition:width .3s;}
    .progress-label{font-size:12px;color:var(--muted);margin-top:6px;text-align:center;}

    .alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
    .alert.success{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;}
    .alert.error  {background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}
    .alert.show   {display:block;}

    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{background:var(--paper);padding:10px 12px;text-align:left;font-size:11px;font-weight:600;
       color:var(--muted);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);}
    td{padding:12px;border-bottom:1px solid var(--border);vertical-align:middle;}
    tr:hover td{background:#fafafa;}

    .badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;}
    .badge.marathi{background:#ffe8d6;color:#cc4400;}
    .badge.english{background:#d6eaff;color:#003d6b;}

    .btn-del{padding:5px 12px;border:1px solid #fca5a5;border-radius:6px;background:transparent;
             color:#dc2626;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
    .btn-del:hover{background:#fee2e2;}

    @media(max-width:600px){.form-row{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<!-- ── Login Overlay ── -->
<div id="loginOverlay">
  <div class="login-card">
    <h2>🔐 Admin Login</h2>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="admin" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-login" id="loginBtn">Login</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ── Header ── -->
<header>
  <h1>📋 E-Paper Admin</h1>
  <div class="api-badge"><div class="dot"></div>vmadmin.vercel.app</div>
  <div id="userChip">
    <span id="userLabel"></span>
    <button id="logoutBtn"><i class="fa fa-sign-out-alt"></i> Logout</button>
  </div>
  <a href="/"><i class="fa fa-arrow-left"></i> Back to site</a>
</header>

<div class="wrap">

  <!-- UPLOAD FORM -->
  <div class="card">
    <h2>Upload New Edition</h2>
    <div class="alert" id="alertBox"></div>

    <form id="uploadForm">
      <div class="form-row">
        <div class="form-group">
          <label>Language</label>
          <select name="lang" required>
            <option value="Marathi">Marathi</option>
            <option value="English">English</option>
          </select>
        </div>
        <div class="form-group">
          <label>Week Label</label>
          <input name="week" placeholder="e.g. Week 52" required/>
        </div>
        <div class="form-group">
          <label>Start Date (DD/MM/YYYY)</label>
          <input name="start" placeholder="01/02/2026" required/>
        </div>
        <div class="form-group">
          <label>End Date (DD/MM/YYYY)</label>
          <input name="end" placeholder="07/02/2026" required/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Tags (comma separated)</label>
          <input name="tags" placeholder="JEE, NEET, CET"/>
        </div>
        <div class="form-group">
          <label>Mark as Latest?</label>
          <select name="is_new">
            <option value="true">Yes — show "New" badge</option>
            <option value="false">No</option>
          </select>
        </div>
      </div>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" name="file" accept=".pdf"/>
        <i class="fa fa-file-pdf"></i>
        <p>Drag & drop PDF here or <span>browse</span></p>
        <div id="fileName">No file chosen</div>
      </div>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-label" id="progressLabel">Uploading…</div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <i class="fa fa-upload"></i> Upload Edition
      </button>
    </form>
  </div>

  <!-- EDITIONS LIST -->
  <div class="card">
    <h2>Uploaded Editions</h2>
    <table id="edTable">
      <thead>
        <tr>
          <th>#</th><th>Lang</th><th>Week</th><th>Date Range</th><th>Tags</th><th>PDF</th><th></th>
        </tr>
      </thead>
      <tbody id="edBody"></tbody>
    </table>
  </div>

</div>

<script>
  // ── Config ──────────────────────────────────────
  const BASE = 'https://vmadmin.vercel.app';

  // ── Auth ────────────────────────────────────────
  let authToken = sessionStorage.getItem('vm_token') || null;

  function authHeaders(extra = {}) {
    const h = { ...extra };
    if (authToken) h['Authorization'] = `Bearer ${authToken}`;
    return h;
  }

  function setLoggedIn(token, username) {
    authToken = token;
    sessionStorage.setItem('vm_token', token);
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('userChip').style.display = 'flex';
    document.getElementById('userLabel').textContent = username || 'Admin';
    loadTable();
  }

  function logout() {
    authToken = null;
    sessionStorage.removeItem('vm_token');
    document.getElementById('loginOverlay').classList.remove('hidden');
    document.getElementById('userChip').style.display = 'none';
    document.getElementById('edBody').innerHTML = '';
  }

  // Validate existing session
  (async function init() {
    if (!authToken) return;
    try {
      let res = await fetch(`${BASE}/api/epapers`, { headers: authHeaders() });
      if (!res.ok && res.status !== 401) {
        res = await fetch(`${BASE}/api/editions`, { headers: authHeaders() });
      }
      if (res.ok) {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('userChip').style.display = 'flex';
        document.getElementById('userLabel').textContent = 'Admin';
        loadTable();
      } else {
        authToken = null;
        sessionStorage.removeItem('vm_token');
      }
    } catch (_) {
      authToken = null;
      sessionStorage.removeItem('vm_token');
    }
  })();

  // ── Login ───────────────────────────────────────
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const btn   = document.getElementById('loginBtn');
    const user  = document.getElementById('loginUser').value.trim();
    const pass  = document.getElementById('loginPass').value;
    const errEl = document.getElementById('loginErr');
    errEl.style.display = 'none';

    if (!user || !pass) {
      errEl.textContent = 'Please enter credentials.';
      errEl.style.display = 'block';
      return;
    }

    btn.textContent = 'Logging in…';
    btn.disabled = true;

    try {
      const res  = await fetch(`${BASE}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await res.json().catch(() => ({}));

      if (res.ok) {
        const token = data.token || data.access_token || data.jwt || 'authenticated';
        setLoggedIn(token, user);
      } else {
        errEl.textContent = data.error || data.message || 'Invalid credentials.';
        errEl.style.display = 'block';
      }
    } catch (err) {
      errEl.textContent = 'Network error. Check connection.';
      errEl.style.display = 'block';
    } finally {
      btn.textContent = 'Login';
      btn.disabled = false;
    }
  });

  ['loginUser','loginPass'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    })
  );

  document.getElementById('logoutBtn').addEventListener('click', logout);

  // ── Drop zone ───────────────────────────────────
  const dz = document.getElementById('dropZone');
  const fi = document.getElementById('fileInput');
  const fn = document.getElementById('fileName');

  dz.addEventListener('click', () => fi.click());
  fi.addEventListener('change', () => {
    fn.textContent = fi.files[0] ? fi.files[0].name : 'No file chosen';
  });
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('over');
    fi.files = e.dataTransfer.files;
    fn.textContent = fi.files[0] ? fi.files[0].name : 'No file chosen';
  });

  // ── Upload ──────────────────────────────────────
  document.getElementById('uploadForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    if (!fi.files[0]) { showAlert('Please select a PDF file.', 'error'); return; }

    const fd  = new FormData(this);
    const pw  = document.getElementById('progressWrap');
    const pf  = document.getElementById('progressFill');
    const pl  = document.getElementById('progressLabel');
    const btn = document.getElementById('submitBtn');

    pw.style.display = 'block';
    btn.disabled = true;

    const xhr = new XMLHttpRequest();
    xhr.open('POST', `${BASE}/api/upload`);
    if (authToken) xhr.setRequestHeader('Authorization', `Bearer ${authToken}`);

    xhr.upload.onprogress = ev => {
      if (ev.lengthComputable) {
        const pct = Math.round(ev.loaded / ev.total * 100);
        pf.style.width = pct + '%';
        pl.textContent = `Uploading… ${pct}%`;
      }
    };

    xhr.onload = () => {
      pw.style.display = 'none';
      pf.style.width = '0%';
      btn.disabled = false;

      if (xhr.status === 401) { showAlert('Session expired. Please log in again.', 'error'); logout(); return; }

      if (xhr.status === 201 || xhr.status === 200) {
        showAlert('Edition uploaded successfully!', 'success');
        document.getElementById('uploadForm').reset();
        fn.textContent = 'No file chosen';
        loadTable();
      } else {
        let err = {};
        try { err = JSON.parse(xhr.responseText); } catch(_) {}
        showAlert(err.error || err.message || 'Upload failed.', 'error');
      }
    };

    xhr.onerror = () => {
      pw.style.display = 'none';
      btn.disabled = false;
      showAlert('Network error.', 'error');
    };

    xhr.send(fd);
  });

  // ── Table ───────────────────────────────────────
  async function loadTable() {
    const tbody = document.getElementById('edBody');
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#aaa;padding:24px"><i class="fa fa-spinner fa-spin"></i> Loading…</td></tr>';

    try {
      let res = await fetch(`${BASE}/api/epapers`, { headers: authHeaders() });
      if (!res.ok && res.status !== 401) {
        res = await fetch(`${BASE}/api/editions`, { headers: authHeaders() });
      }
      if (res.status === 401) { logout(); return; }

      const data = await res.json();
      tbody.innerHTML = '';

      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#aaa;padding:24px">No editions yet.</td></tr>';
        return;
      }

      data.forEach(e => {
        const pdfUrl = e.pdf || e.pdf_url || e.file_url || null;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${e.id}</td>
          <td><span class="badge ${(e.lang||'').toLowerCase()}">${e.lang}</span></td>
          <td>${e.week}</td>
          <td>${e.start} – ${e.end}</td>
          <td>${(Array.isArray(e.tags) ? e.tags : (e.tags||'').split(',')).join(', ')}</td>
          <td>
            ${pdfUrl
              ? `<a href="${pdfUrl}" target="_blank" style="color:var(--orange);font-size:12px;font-weight:600;text-decoration:none">
                   <i class="fa fa-eye"></i> View
                 </a>`
              : '<span style="color:#aaa;font-size:12px">–</span>'}
          </td>
          <td>
            <button class="btn-del" onclick="deleteEdition(${e.id})">
              <i class="fa fa-trash"></i> Delete
            </button>
          </td>`;
        tbody.appendChild(tr);
      });
    } catch (_) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#dc2626;padding:24px">Failed to load editions.</td></tr>';
    }
  }

  async function handleUpload(event) {
    event.preventDefault();
    const formData = new FormData(event.target);
    const UPLOAD_URL = "https://vmadmin.vercel.app";

    try {
        const response = await fetch(UPLOAD_URL, {
            method: 'POST',
            body: formData,
            // Do NOT set Content-Type header manually when using FormData
        });

        const result = await response.json();
        if (result.success) {
            alert("Upload Successful!");
            window.location.reload();
        } else {
            alert("Upload failed: " + result.error);
        }
    } catch (error) {
        console.error("Upload error:", error);
        alert("Network Error: Could not connect to the server.");
    }
}
  // ── Alert ───────────────────────────────────────
  function showAlert(msg, type) {
    const el = document.getElementById('alertBox');
    el.textContent = msg;
    el.className = `alert ${type} show`;
    setTimeout(() => el.classList.remove('show'), 4000);
  }
</script>
</body>
</html>
