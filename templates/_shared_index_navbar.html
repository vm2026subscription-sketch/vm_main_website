<!-- ── SCRIPTS ── -->
<script>
  (function () {
    var overlay = document.getElementById('vmSearchOverlay');
    var trigger = document.querySelector('.vm-search-trigger');
    var closeBtn = document.getElementById('vmSearchClose');
    var input = document.getElementById('vmSearchInput');
    var submit = document.getElementById('vmSearchSubmit');
    var hint = document.getElementById('vmSearchHint');

    if (!overlay || !trigger || !input || !submit || !closeBtn || !hint) {
      return;
    }

    var searchItems = [
      { keywords: ['fyjc', 'rank', 'predictor', 'fyjc rank', 'rank predictor'], url: '{{ url_for("fyjc_rank") }}', label: 'FYJC Rank Predictor' },
      { keywords: ['cutoff', 'cut-off', 'cut off', 'cutoffs'], url: '{{ url_for("cutoffs") }}', label: 'Cut-offs' },
      { keywords: ['admission', 'admissions', 'dte'], url: '{{ url_for("admissions") }}', label: 'Admissions' },
      { keywords: ['university', 'universities'], url: '{{ url_for("universities") }}', label: 'Universities' },
      { keywords: ['college', 'colleges'], url: '{{ url_for("colleges") }}', label: 'Colleges' },
      { keywords: ['course', 'courses'], url: '{{ url_for("courses") }}', label: 'Courses' },
      { keywords: ['exam', 'exams', 'entrance', 'jee', 'neet', 'cet', 'mht-cet'], url: '{{ url_for("exams") }}', label: 'Entrance Exams' },
      { keywords: ['mock', 'mock exam', 'mock test'], url: '{{ url_for("mock_exams") }}', label: 'Mock Exams' },
      { keywords: ['news', 'update', 'updates'], url: '{{ url_for("news") }}', label: 'News' },
      { keywords: ['article', 'articles', 'career'], url: '{{ url_for("articles") }}', label: 'Career Articles' },
      { keywords: ['story', 'stories', 'student'], url: '{{ url_for("student_stories") }}', label: 'Student Stories' },
      { keywords: ['guide', 'guide me', 'guideme'], url: '{{ url_for("guide_me") }}', label: 'Guide Me' },
      { keywords: ['epaper', 'e-paper'], url: '{{ url_for("epaper.epaper_viewer") }}', label: 'E-Paper' }
    ];

    function openSearch() {
      overlay.classList.add('vm-active');
      hint.textContent = '';
      setTimeout(function () { input.focus(); }, 50);
    }

    function closeSearch() {
      overlay.classList.remove('vm-active');
      input.value = '';
      hint.textContent = '';
    }

    function submitSearch() {
      var query = input.value.trim().toLowerCase();
      if (!query) return;

      var bestMatch = null;
      var bestScore = 0;

      for (var i = 0; i < searchItems.length; i++) {
        var item = searchItems[i];
        for (var j = 0; j < item.keywords.length; j++) {
          var keyword = item.keywords[j];
          if (query === keyword) {
            bestMatch = item;
            bestScore = 100;
            break;
          }
          if (keyword.indexOf(query) === 0 || query.indexOf(keyword) === 0) {
            var currentScore = Math.max(keyword.indexOf(query) === 0 ? 50 : 30);
            if (currentScore > bestScore) {
              bestMatch = item;
              bestScore = currentScore;
            }
          }
        }
        if (bestScore === 100) break;
      }

      if (bestMatch) {
        window.location.href = bestMatch.url;
      } else {
        hint.textContent = 'No results found for "' + query + '"';
      }
    }

    trigger.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      openSearch();
    });

    closeBtn.addEventListener('click', function (e) {
      e.preventDefault();
      closeSearch();
    });

    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) {
        closeSearch();
      }
    });

    submit.addEventListener('click', function (e) {
      e.preventDefault();
      submitSearch();
    });

    input.addEventListener('keyup', function (e) {
      if (e.key === 'Enter') {
        submitSearch();
      }
      if (e.key === 'Escape') {
        closeSearch();
      }
    });
  })();
</script>

<script>
  // Hide legacy page headers that contain navigation to avoid duplicate navbars
  (function(){
    try {
      var header = document.querySelector('.vm-main-header');
      if (!header) return;
      var siblings = document.querySelectorAll('.vm-main-header ~ header');
      siblings.forEach(function(h){
        if (!h) return;
        var nav = h.querySelector('nav');
        if (!nav) return;
        var links = nav.querySelectorAll('a');
        if (links.length >= 4 || nav.classList.contains('navbar') ) {
          h.style.display = 'none';
        }
      });
    } catch (e) {
      console.error('Nav dedupe script error', e);
    }
  })();
</script>

<script>
  (function(){
    var toggle = document.getElementById('vmNavToggle');
    var header = document.querySelector('.vm-main-header');
    var links = document.querySelector('.vm-main-links');
    if (!toggle || !header || !links) return;

    toggle.addEventListener('click', function(e){
      e.preventDefault();
      header.classList.toggle('vm-expanded');
      var expanded = header.classList.contains('vm-expanded');
      this.setAttribute('aria-expanded', expanded ? 'true' : 'false');
    });

    // Mobile click handler to open dropdowns on mobile screen
    document.querySelectorAll('.vm-dropdown-trigger').forEach(function(trigger) {
      trigger.addEventListener('click', function(e) {
        if (window.innerWidth <= 992) {
          e.preventDefault();
          var parent = this.parentElement;
          parent.classList.toggle('vm-mobile-open');
        }
      });
    });

    // Ensure collapsed state is reset when resizing to large screens
    window.addEventListener('resize', function(){
      if (window.innerWidth > 992) {
        header.classList.remove('vm-expanded');
        if (toggle) toggle.setAttribute('aria-expanded','false');
        document.querySelectorAll('.vm-dropdown').forEach(function(d) {
          d.classList.remove('vm-mobile-open');
        });
      }
    });
  })();
</script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var themeToggle = document.getElementById('themeToggle');
    if (themeToggle) {
      // Load preference
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-mode');
        themeToggle.textContent = '🌙';
      } else {
        themeToggle.textContent = '☀️';
      }
      
      themeToggle.addEventListener('click', function() {
        document.body.classList.toggle('light-mode');
        var isLight = document.body.classList.contains('light-mode');
        if (isLight) {
          localStorage.setItem('theme', 'light');
          themeToggle.textContent = '🌙';
        } else {
          localStorage.setItem('theme', 'dark');
          themeToggle.textContent = '☀️';
        }

        // Notify chatbot iframe
        var chatFrame = document.getElementById('vmChatFrame');
        if (chatFrame && chatFrame.contentWindow) {
          try {
            chatFrame.contentWindow.postMessage({
              type: 'theme-change',
              theme: isLight ? 'light' : 'dark'
            }, '*');
          } catch (e) {}
        }
      });
    }
  });
</script>

<script>
  (function () {
    var launcher = document.getElementById('vmChatLauncher');
    var wrap = document.getElementById('vmChatWrap');
    var frame = document.getElementById('vmChatFrame');
    if (!launcher || !wrap || !frame) return;

    function openChat() {
      wrap.classList.add('vm-open');
      wrap.setAttribute('aria-hidden', 'false');
      launcher.classList.add('vm-active');
      var isLight = document.body.classList.contains('light-mode');
      try {
        frame.contentWindow.postMessage({ 
          type: 'chatbot-open',
          theme: isLight ? 'light' : 'dark'
        }, '*');
      } catch (e) {}
    }

    function closeChat() {
      wrap.classList.remove('vm-open');
      wrap.setAttribute('aria-hidden', 'true');
      launcher.classList.remove('vm-active');
    }

    launcher.addEventListener('click', function(e) {
      e.preventDefault();
      if (wrap.classList.contains('vm-open')) {
        closeChat();
      } else {
        openChat();
      }
    });

    window.addEventListener('message', function (event) {
      if (!event || !event.data) return;
      if (event.data.type === 'chatbot-close') {
        closeChat();
      }
    });
  })();
</script>
