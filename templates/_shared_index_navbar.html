<style>
  .vm-nav-topbar {
    background: #F8FAFC; /* Light gray */
    color: #64748B;
    font-size: 13px;
    padding: 8px 0;
    font-family: 'Inter', sans-serif;
  }

  /* Hide legacy per-page navbars that follow the shared navbar to avoid duplicates */
  .vm-main-header ~ .main-nav,
  .vm-main-header ~ header.main-nav,
  .vm-main-header ~ .navbar-default,
  .vm-main-header ~ .header {
    display: none !important;
  }

  .vm-nav-topbar .vm-nav-inner,
  .vm-main-header .vm-nav-inner {
    max-width: 100%;
    margin: 0;
    padding: 0 24px;
    box-sizing: border-box;
  }

  .vm-nav-topbar .vm-nav-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  .vm-nav-topbar a {
    color: #64748B;
    text-decoration: none;
    margin-right: 15px;
    font-weight: 500;
  }

  .vm-nav-topbar a:hover {
    color: #1E293B; /* Darker on hover */
  }

  .vm-nav-right {
    font-weight: 600;
    letter-spacing: 0.5px;
    white-space: nowrap;
    padding-right: 20px;
  }

  .vm-main-header {
    background: #FFFFFF; /* White */
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    position: sticky;
    top: 0;
    z-index: 1000;
    font-family: 'Inter', sans-serif;
  }

  .vm-brand-text {
    font-size: 28px;
    font-weight: 900;
    color: #B59DF8; /* Lavender */
    letter-spacing: -1px;
    font-family: 'Syne', sans-serif;
    font-style: italic;
  }
  .vm-brand-text span {
    color: #B59DF8; /* Keep it uniform as per Stitch design */
  }

  .vm-main-header .vm-nav-inner {
    min-height: 62px;
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: space-between;
    flex-wrap: nowrap; /* keep brand + links on a single line */
  }

  .vm-brand {
    display: inline-flex;
    align-items: center;
    flex: 0 0 auto;
    margin-right: 24px;
    text-decoration: none !important;
  }

  .vm-brand-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 24px;
    color: #B59DF8; /* Lavender */
    letter-spacing: -0.5px;
  }
  
  .vm-brand-text span {
    color: #FFFFFF;
  }

  .vm-main-links {
    margin-left: 0; /* allow it to flow under brand when wrapped */
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1 1 auto;
    flex-wrap: nowrap; /* default: keep single row and allow horizontal scroll on wide screens */
    flex-basis: auto;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    justify-content: flex-start;
  }

  /* On narrower viewports, let links wrap to a second row below the brand */
  @media (max-width: 992px) {
    .vm-main-links {
      flex-wrap: wrap;
      flex-basis: 100%;
      overflow-x: visible;
      justify-content: center;
      gap: 6px;
    }
    .vm-main-links a { padding: 10px 8px; }
    .vm-nav-toggle { display: inline-flex; }
    /* hide links initially on medium screens, show when toggled */
    .vm-main-header.vm-collapsed .vm-main-links { display: none; }
    .vm-main-header .vm-main-links { transition: max-height 0.25s ease; }
  }

  .vm-main-links a {
    color: #1E293B;
    font-weight: 800;
    padding: 10px 8px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-decoration: none;
    position: relative;
    white-space: nowrap;
    transition: color 0.3s ease;
  }

  .vm-main-links a::before {
    content: "";
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0;
    height: 3px;
    background: #B4F56E; /* Lime Green */
    transform: translateX(-50%);
    transition: width 0.3s ease;
    border-radius: 3px 3px 0 0;
  }

  .vm-main-links a:hover,
  .vm-main-links a.vm-active {
    color: #B4F56E;
  }

  .vm-main-links a:hover::before,
  .vm-main-links a.vm-active::before {
    width: 100%;
  }

  .vm-badge-new {
    background: #ffcc4d;
    color: #111;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 700;
    margin-left: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    box-shadow: none;
    animation: none;
  }

  .vm-main-links a i {
    font-size: 14px;
  }

  .vm-main-links a.vm-search {
    margin-left: 2px;
    padding-right: 4px;
  }

  /* nav toggle (hamburger) */
  .vm-nav-toggle {
    display: none;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255,255,255,0.1);
    color: #FFFFFF;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 18px;
    margin-left: 8px;
  }

  /* Auth button styles */
  .vm-main-links a.nav-auth {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 20px;
    margin-left: 12px;
    border-radius: 99px;
    border: none;
    font-weight: 700;
    font-size: 14px;
    line-height: 1;
    white-space: nowrap;
    text-transform: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  
  .vm-main-links a.nav-auth::before {
    display: none; /* No underline for buttons */
  }
  
  .vm-main-links a.nav-auth:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  }

  .vm-main-links a.nav-register {
    background: #B59DF8; /* Lavender */
    color: #0B0F19; /* Dark Navy text */
  }

  .vm-main-links a.nav-register:hover {
    background: #A387EB;
    color: #0B0F19;
  }

  .vm-main-links a.nav-login {
    background: rgba(255, 255, 255, 0.1);
    color: #FFFFFF;
    border: 1px solid rgba(255, 255, 255, 0.2);
    margin-left: auto;
  }

  .vm-main-links a.nav-login:hover {
    background: rgba(255, 255, 255, 0.2);
    color: #FFFFFF;
  }

  @media (max-width: 768px) {
    .vm-main-links a.nav-auth { padding: 6px 8px; font-size: 12px; }
    .vm-main-links a { padding: 12px 8px; font-size: 11px; }
  }

  .vm-search-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.75);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    z-index: 2000;
    backdrop-filter: blur(4px);
  }

  .vm-search-overlay.vm-active {
    display: flex;
  }

  .vm-search-modal {
    width: 90%;
    max-width: 600px;
    background: #FFFFFF;
    border-radius: 12px;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    position: relative;
    border: 1px solid rgba(0,0,0,0.05);
  }

  .vm-search-modal input {
    flex: 1;
    background: #F4F6F8;
    border: 1px solid rgba(0,0,0,0.1);
    color: #1E293B;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14px;
    outline: none;
  }
  
  .vm-search-modal input::placeholder {
    color: #A0AEC0;
  }

  .vm-search-modal button {
    background: #B4F56E;
    border: none;
    color: #0B0F19;
    font-weight: 700;
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s;
  }

  .vm-search-modal button:hover {
    background: #A1DE63;
  }

  .vm-search-close {
    position: absolute;
    top: -42px;
    right: 0;
    color: #fff;
    font-size: 28px;
    cursor: pointer;
    line-height: 1;
  }

  .vm-search-hint {
    display: block;
    margin-top: 8px;
    font-size: 12px;
    color: #d1d5db;
  }

  @media (max-width: 768px) {
    .vm-nav-topbar .vm-nav-inner {
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .vm-main-header .vm-nav-inner {
      flex-direction: column;
      align-items: center;
      padding-top: 8px;
    }

    .vm-main-links {
      width: 100%;
      margin-left: 0;
      padding-bottom: 4px;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }

    .vm-main-links a {
      padding: 10px 8px;
      font-size: 12px;
    }

    .vm-nav-right {
      text-align: center;
      margin-top: 6px;
      padding-right: 0;
    }
  }
</style>

<div class="vm-search-overlay" id="vmSearchOverlay">
  <div class="vm-search-modal">
    <input type="text" id="vmSearchInput" placeholder="Search: FYJC rank, cutoff, courses, exams...">
    <button type="button" id="vmSearchSubmit">🔍</button>
    <span class="vm-search-close" id="vmSearchClose">&times;</span>
  </div>
  <small class="vm-search-hint" id="vmSearchHint"></small>
</div>

<script>
  (function () {
    var overlay = document.getElementById('vmSearchOverlay');
    var trigger = document.querySelector('.vm-search-trigger');
    var closeBtn = document.getElementById('vmSearchClose');
    var input = document.getElementById('vmSearchInput');
    var submit = document.getElementById('vmSearchSubmit');
    var hint = document.getElementById('vmSearchHint');

    if (!overlay || !trigger || !input || !submit || !closeBtn || !hint) {
      return;
    }

    var searchItems = [
      { keywords: ['fyjc', 'rank', 'predictor', 'fyjc rank', 'rank predictor'], url: '{{ url_for("fyjc_rank") }}', label: 'FYJC Rank Predictor' },
      { keywords: ['cutoff', 'cut-off', 'cut off', 'cutoffs'], url: '{{ url_for("cutoffs") }}', label: 'Cut-offs' },
      { keywords: ['admission', 'admissions', 'dte'], url: '{{ url_for("admissions") }}', label: 'Admissions' },
      { keywords: ['university', 'universities'], url: '{{ url_for("universities") }}', label: 'Universities' },
      { keywords: ['college', 'colleges'], url: '{{ url_for("colleges") }}', label: 'Colleges' },
      { keywords: ['course', 'courses'], url: '{{ url_for("courses") }}', label: 'Courses' },
      { keywords: ['exam', 'exams', 'entrance', 'jee', 'neet', 'cet', 'mht-cet'], url: '{{ url_for("exams") }}', label: 'Entrance Exams' },
      { keywords: ['mock', 'mock exam', 'mock test'], url: '{{ url_for("mock_exams") }}', label: 'Mock Exams' },
      { keywords: ['news', 'update', 'updates'], url: '{{ url_for("news") }}', label: 'News' },
      { keywords: ['article', 'articles', 'career'], url: '{{ url_for("articles") }}', label: 'Career Articles' },
      { keywords: ['story', 'stories', 'student'], url: '{{ url_for("student_stories") }}', label: 'Student Stories' },
      { keywords: ['guide', 'guide me', 'guideme'], url: '{{ url_for("guide_me") }}', label: 'Guide Me' },
      { keywords: ['epaper', 'e-paper'], url: '{{ url_for("epaper.epaper_viewer") }}', label: 'E-Paper' }
    ];

    function openSearch() {
      overlay.classList.add('vm-active');
      hint.textContent = '';
      setTimeout(function () { input.focus(); }, 50);
    }

    function closeSearch() {
      overlay.classList.remove('vm-active');
      input.value = '';
      hint.textContent = '';
    }

    function submitSearch() {
      var query = input.value.trim().toLowerCase();
      if (!query) return;

      var bestMatch = null;
      var bestScore = 0;

      for (var i = 0; i < searchItems.length; i++) {
        var item = searchItems[i];
        for (var j = 0; j < item.keywords.length; j++) {
          var keyword = item.keywords[j];
          if (query === keyword) {
            bestMatch = item;
            bestScore = 100;
            break;
          }
          if (keyword.indexOf(query) === 0 || query.indexOf(keyword) === 0) {
            var currentScore = Math.max(keyword.indexOf(query) === 0 ? 50 : 30);
            if (currentScore > bestScore) {
              bestMatch = item;
              bestScore = currentScore;
            }
          }
        }
        if (bestScore === 100) break;
      }

      if (bestMatch) {
        window.location.href = bestMatch.url;
      } else {
        hint.textContent = 'No results found for "' + query + '"';
      }
    }

    trigger.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      openSearch();
    });

    closeBtn.addEventListener('click', function (e) {
      e.preventDefault();
      closeSearch();
    });

    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) {
        closeSearch();
      }
    });

    submit.addEventListener('click', function (e) {
      e.preventDefault();
      submitSearch();
    });

    input.addEventListener('keyup', function (e) {
      if (e.key === 'Enter') {
        submitSearch();
      }
      if (e.key === 'Escape') {
        closeSearch();
      }
    });
  })();
</script>

<script>
  // Hide legacy page headers that contain navigation to avoid duplicate navbars
  (function(){
    try {
      var header = document.querySelector('.vm-main-header');
      if (!header) return;
      // find sibling headers that come after the shared header
      var siblings = document.querySelectorAll('.vm-main-header ~ header');
      siblings.forEach(function(h){
        if (!h) return;
        var nav = h.querySelector('nav');
        if (!nav) return;
        // if the header's nav looks like a full site nav (several links or bootstrap navbar), hide it
        var links = nav.querySelectorAll('a');
        if (links.length >= 4 || nav.classList.contains('navbar') ) {
          h.style.display = 'none';
        }
      });
    } catch (e) {
      console.error('Nav dedupe script error', e);
    }
  })();
</script>

<script>
  (function(){
    var toggle = document.getElementById('vmNavToggle');
    var header = document.querySelector('.vm-main-header');
    var links = document.querySelector('.vm-main-links');
    if (!toggle || !header || !links) return;

    toggle.addEventListener('click', function(e){
      e.preventDefault();
      var expanded = this.getAttribute('aria-expanded') === 'true';
      this.setAttribute('aria-expanded', expanded ? 'false' : 'true');
      header.classList.toggle('vm-collapsed');
    });

    // ensure collapsed state is reset when resizing to large screens
    window.addEventListener('resize', function(){
      if (window.innerWidth > 992) {
        header.classList.remove('vm-collapsed');
        if (toggle) toggle.setAttribute('aria-expanded','false');
        links.style.display = '';
      }
    });
  })();
</script>
