<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Paper Admin — Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-radius: 16px;
      padding: 40px 36px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo .icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #e41e26, #c0151c);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
      margin-bottom: 14px;
    }

    .login-logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -.3px;
    }

    .login-logo p {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: #475569;
      font-size: 14px;
      pointer-events: none;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px 11px 38px;
      background: #0f1117;
      border: 1px solid #2a2d3e;
      border-radius: 9px;
      color: #f1f5f9;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }

    .form-group input:focus {
      border-color: #e41e26;
    }

    .error-msg {
      background: rgba(228,30,38,.12);
      border: 1px solid rgba(228,30,38,.35);
      color: #f87171;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #e41e26, #c0151c);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }

    .btn-login:hover { opacity: .9; }
    .btn-login:active { transform: scale(.98); }

    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #475569;
    }

    .back-link a {
      color: #94a3b8;
      text-decoration: none;
    }

    .back-link a:hover { color: #e41e26; }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <div class="icon"><i class="fa fa-newspaper"></i></div>
    <h1>E-Paper Admin</h1>
    <p>Sign in to manage editions</p>
  </div>

  {% if error %}
  <div class="error-msg">
    <i class="fa fa-circle-exclamation"></i>
    {{ error }}
  </div>
  {% endif %}

  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <i class="fa fa-user input-icon"></i>
        <input type="text" name="username" placeholder="Enter username" autofocus autocomplete="username" required>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fa fa-lock input-icon"></i>
        <input type="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
    </div>

    <button type="submit" class="btn-login">
      <i class="fa fa-sign-in-alt"></i> Sign In
    </button>
  </form>

  <div class="back-link">
    <a href="/"><i class="fa fa-arrow-left"></i> Back to website</a>
  </div>
</div>

</body>
</html>
