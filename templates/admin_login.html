<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | VidyarthiMitra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="{{ url_for('static', filename='title.png') }}" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .login-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo img {
      height: 48px;
      object-fit: contain;
    }

    .login-title {
      text-align: center;
      color: #f1f5f9;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .login-sub {
      text-align: center;
      color: #64748b;
      font-size: 0.875rem;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #94a3b8;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #475569;
      font-size: 0.9rem;
    }

    .input-wrap input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 1rem;
      padding: 12px 14px 12px 40px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-wrap input:focus {
      border-color: #f97316;
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 0.875rem;
      padding: 10px 14px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-login {
      width: 100%;
      background: #f97316;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover { background: #ea6d10; }
    .btn-login:active { transform: scale(0.98); }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: #64748b;
      font-size: 0.875rem;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link a:hover { color: #f97316; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logo">
      <img src="{{ url_for('static', filename='logo.png') }}" alt="VidyarthiMitra">
    </div>
    <h1 class="login-title">Admin Panel</h1>
    <p class="login-sub">VidyarthiMitra.org — Restricted Access</p>

    {% if error %}
    <div class="error-msg">
      <i class="fa fa-circle-exclamation"></i>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin_login') }}">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="form-group">
        <label for="password">Admin Password</label>
        <div class="input-wrap">
          <i class="fa fa-lock"></i>
          <input type="password" id="password" name="password" placeholder="Enter admin password" autofocus required>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="fa fa-right-to-bracket"></i> Login
      </button>
    </form>

    <div class="back-link">
      <a href="{{ url_for('index') }}"><i class="fa fa-arrow-left"></i> Back to Website</a>
    </div>
  </div>

</body>
</html>
