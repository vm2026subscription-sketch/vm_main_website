<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ article.title }} | Career Article</title>
  <link rel="shortcut icon" href="{{ url_for('static', filename='title.png') }}" type="image/x-icon">
  <style>
    :root {
      --bg: #f8f7f4;
      --paper: #ffffff;
      --ink: #1e2026;
      --muted: #5a6270;
      --line: #e2e5eb;
      --accent: #ff8c00;
      --accent-ink: #ffffff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top right, #e8f8f5 0%, transparent 42%), var(--bg);
      min-height: 100vh;
    }

    .wrap {
      width: min(860px, 92vw);
      margin: 48px auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 12px 32px rgba(31, 43, 55, 0.08);
    }

    .meta {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.5rem, 2.6vw, 2.2rem);
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 1rem;
    }

    .cta {
      margin-top: 26px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      border: 1px solid var(--line);
      color: var(--ink);
      background: #fff;
    }

    .btn.primary {
      border-color: var(--accent);
      color: var(--accent-ink);
      background: var(--accent);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <span class="meta">{{ article.category }}</span>
    <h1>{{ article.title }}</h1>
    {% for paragraph in article.paragraphs %}
    <p>{{ paragraph }}</p>
    {% endfor %}
    <div class="cta">
      <a class="btn primary" href="{{ url_for('articles') }}">Back to Articles</a>
      <a class="btn" href="{{ url_for('feedback') }}">Contact Support</a>
    </div>
  </main>
</body>
</html>
