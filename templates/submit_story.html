<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <link rel="shortcut icon" href="{{ url_for('static', filename='title.png') }}" type="image/x-icon">
  <link rel="stylesheet" href="{{ url_for('static', filename='submit_story.css') }}">
</head>
<body>

<!-- NAV -->
<nav class="navbar">
<img src="{{ url_for('static', filename='logo.png') }}" alt="Vidyarthi Mitra">
  <a class="nav-back" href="{{ url_for('student_stories') }}">← Back to Stories</a>
</nav>

<!-- HERO -->
<header class="hero">
  <h1>Submit Your Story</h1>
  <p>Inspire thousands of students with your journey</p>
</header>

<!-- FORM SECTION -->
<section class="form-section">
  <form id="storyForm" class="story-form" novalidate>

    <h2>Student Story Submission</h2>

    <!-- NAME -->
    <div class="form-group">
      <label for="name">Full Name <span class="required">*</span></label>
      <input type="text" id="name" name="name"
             placeholder="Enter your full name" required>
      <span class="field-error" id="nameError"></span>
    </div>

    <!-- EMAIL -->
    <div class="form-group">
      <label for="email">Email Address <span class="required">*</span></label>
      <input type="email" id="email" name="email"
             placeholder="Enter your email address" required>
      <span class="field-error" id="emailError"></span>
    </div>

    <!-- EXAM / ACHIEVEMENT -->
    <div class="form-group">
      <label for="exam">Exam / Achievement <span class="required">*</span></label>
      <input type="text" id="exam" name="exam"
             placeholder="JEE / NEET / CET / UPSC / Job etc." required>
      <span class="field-error" id="examError"></span>
    </div>

    <!-- STORY -->
    <div class="form-group">
      <label for="story">Your Story <span class="required">*</span></label>
      <textarea id="story" name="story" rows="7"
        placeholder="Write your preparation strategy, struggles, achievements & tips..."
        required></textarea>
      <span class="char-count" id="charCount">0 / 2000 characters</span>
      <span class="field-error" id="storyError"></span>
    </div>

    <!-- SUBMIT -->
    <button type="submit" id="submitBtn">
      <span id="btnText">Submit Story</span>
      <span id="btnSpinner" class="btn-spinner hidden"></span>
    </button>

    <!-- SUCCESS -->
    <div class="success-message hidden" id="successMsg">
      <span class="success-icon">✅</span>
      <div>
        <strong>Story submitted successfully!</strong>
        <p>Thank you! Your story will appear after a quick review.</p>
        <a href="{{ url_for('student_stories') }}">← Browse all stories</a>
      </div>
    </div>

    <!-- ERROR -->
    <div class="error-banner hidden" id="errorBanner"></div>

  </form>
</section>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 VidyarthiMitra.org | Student Stories</p>
</footer>

<script src="{{ url_for('static', filename='submit_story.js') }}"></script>
</body>
</html>
