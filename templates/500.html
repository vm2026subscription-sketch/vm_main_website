<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Something went wrong — Vidyarthi Mitra</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a1120;
      color: #e2e8f0;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .logo {
      background: #fff;
      border-radius: 10px;
      padding: 6px 14px;
      margin-bottom: 48px;
      display: inline-block;
    }
    .logo img { height: 36px; display: block; }
    .code {
      font-size: clamp(80px, 15vw, 140px);
      font-weight: 900;
      line-height: 1;
      color: #ff6600;
      letter-spacing: -4px;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.65;
      max-width: 440px;
      margin: 0 auto 36px;
    }
    .links { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .btn-primary {
      background: #ff6600;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      padding: 12px 28px;
      border-radius: 99px;
      text-decoration: none;
    }
    .btn-primary:hover { background: #ff7733; }
    .btn-secondary {
      background: transparent;
      color: #94a3b8;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 99px;
      border: 1px solid rgba(255,255,255,.12);
      text-decoration: none;
    }
    .btn-secondary:hover { border-color: rgba(255,255,255,.3); color: #e2e8f0; }
  </style>
</head>
<body>
  <a href="/" class="logo">
    <img src="/static/logo.png" alt="Vidyarthi Mitra">
  </a>
  <div class="code">500</div>
  <h1>Something went wrong</h1>
  <p>
    An unexpected error occurred on our end. Our team has been notified.<br>
    Please try again in a moment.
  </p>
  <div class="links">
    <a href="/" class="btn-primary">Go to Home</a>
    <a href="/news" class="btn-secondary">Latest News</a>
    <a href="/epaper" class="btn-secondary">E-Paper</a>
  </div>
</body>
</html>
