<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>News Reel — Vidyarthi Mitra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Latest education news — Vidyarthi Mitra News Reel">
  <meta name="theme-color" content="#0f0f12">
  <link rel="shortcut icon" href="{{ url_for('static', filename='title.png') }}" type="image/x-icon">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"></noscript>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --c-entrance:   #e11d48;
      --c-results:    #2563eb;
      --c-admissions: #059669;
      --c-govtjobs:   #7c3aed;
      --c-scholarship:#d97706;
      --c-default:    #475569;
    }

    html { height: 100%; }

    body {
      height: 100%;
      background: #0f0f12;
      font-family: -apple-system, 'Inter', 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Progress bar (top of page) ── */
    #nr-progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      background: var(--accent, #e11d48);
      width: 0%;
      z-index: 200;
      transition: width .25s ease, background .4s;
    }

    /* ── Reel container ── */
    #nr-reel {
      width: 100%;
      height: 100vh;  /* fallback */
      height: 100svh; /* small viewport height — accounts for mobile address bar */
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #nr-reel::-webkit-scrollbar { display: none; }

    /* ── Each card ── */
    .nr-card {
      width: 100%;
      height: 100vh;
      height: 100svh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Background image (blurred) */
    .nr-bg {
      position: absolute;
      inset: -10%;
      background-size: cover;
      background-position: center;
      filter: blur(28px) brightness(.32) saturate(1.4);
    }

    /* Gradient overlay */
    .nr-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,.15) 0%,
        rgba(0,0,0,.05) 30%,
        rgba(0,0,0,.55) 65%,
        rgba(0,0,0,.92) 100%
      );
    }

    /* No-image fallback — category gradient fills bg */
    .nr-card.no-img .nr-bg { display: none; }
    .nr-card.no-img .nr-overlay {
      background: var(--card-grad, linear-gradient(145deg,#1e293b,#0f0f12));
      opacity: 1;
    }

    /* ── Content layer ── */
    .nr-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: env(safe-area-inset-top, 12px) 0 env(safe-area-inset-bottom, 12px);
    }

    /* ── Top bar ── */
    .nr-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
    }
    .nr-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .nr-brand-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent, #e11d48);
      animation: nr-pulse 2s infinite;
    }
    @keyframes nr-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .6; transform: scale(.8); }
    }
    .nr-brand-text {
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      letter-spacing: .3px;
    }
    .nr-counter {
      font-size: 12px;
      color: rgba(255,255,255,.55);
      font-weight: 600;
    }

    /* ── Category badge ── */
    .nr-cat {
      padding: 0 18px;
      margin-bottom: 8px;
    }
    .nr-cat-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px 4px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .6px;
      border: 1px solid rgba(255,255,255,.15);
      backdrop-filter: blur(8px);
    }
    .nr-cat-dot { width: 6px; height: 6px; border-radius: 50%; }

    /* ── Image preview (thumbnail, visible on no-bg cards) ── */
    .nr-thumb {
      margin: 0 18px 10px;
      border-radius: 12px;
      overflow: hidden;
      max-height: 180px;
      display: none;
    }
    .nr-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .nr-card.no-img .nr-thumb { display: block; }

    /* ── Body (bottom section) ── */
    .nr-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 18px 18px;
    }
    /* No-image cards: center content vertically */
    .nr-card.no-img .nr-body {
      justify-content: center;
      padding-bottom: 80px;
    }

    .nr-headline {
      font-size: clamp(18px, 4.5vw, 24px);
      font-weight: 800;
      line-height: 1.28;
      color: #fff;
      margin-bottom: 10px;
      text-shadow: 0 1px 6px rgba(0,0,0,.4);
    }

    .nr-desc {
      font-size: 13.5px;
      color: rgba(255,255,255,.78);
      line-height: 1.62;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .nr-meta {
      font-size: 11.5px;
      color: rgba(255,255,255,.45);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nr-meta-sep { opacity: .4; }

    /* ── Action buttons ── */
    .nr-actions {
      display: flex;
      gap: 10px;
    }

    .nr-btn-read {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 13px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,.16);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.22);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      transition: background .2s;
    }
    .nr-btn-read:active { background: rgba(255,255,255,.26); }

    .nr-btn-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.18);
      color: #fff;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .2s;
      flex-shrink: 0;
    }
    .nr-btn-icon:active { background: rgba(255,255,255,.24); }

    /* ── Swipe hint (first card only) ── */
    .nr-swipe-hint {
      position: absolute;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: rgba(255,255,255,.45);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .4px;
      text-transform: uppercase;
      pointer-events: none;
      animation: nr-float 2.2s ease-in-out infinite;
    }
    .nr-swipe-hint i { font-size: 14px; }
    @keyframes nr-float {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-7px); }
    }

    /* ── Desktop nav arrows ── */
    #nr-nav-up, #nr-nav-down {
      position: fixed;
      right: 22px;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.15);
      color: #fff;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      transition: background .2s;
    }
    #nr-nav-up { top: calc(50% - 52px); }
    #nr-nav-down { top: calc(50% + 8px); }
    #nr-nav-up:hover, #nr-nav-down:hover { background: rgba(255,255,255,.2); }

    /* Hide desktop arrows on touch screens */
    @media (hover: none) {
      #nr-nav-up, #nr-nav-down { display: none; }
    }

    /* ── Toast ── */
    #nr-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.18);
      color: #fff;
      padding: 9px 20px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      z-index: 300;
      opacity: 0;
      transition: all .25s;
      white-space: nowrap;
      pointer-events: none;
    }
    #nr-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Loading screen ── */
    #nr-loading {
      position: fixed;
      inset: 0;
      background: #0f0f12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 500;
    }
    .nr-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,.1);
      border-top-color: #e11d48;
      border-radius: 50%;
      animation: nr-spin .75s linear infinite;
    }
    @keyframes nr-spin { to { transform: rotate(360deg); } }
    #nr-loading p { color: rgba(255,255,255,.45); font-size: 13px; }

    /* ── Error screen ── */
    #nr-error {
      position: fixed;
      inset: 0;
      background: #0f0f12;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 500;
      text-align: center;
      padding: 32px;
    }
    #nr-error i { font-size: 40px; color: rgba(255,255,255,.2); }
    #nr-error h2 { font-size: 18px; color: rgba(255,255,255,.7); }
    #nr-error p { font-size: 13px; color: rgba(255,255,255,.35); }
    #nr-error button {
      margin-top: 8px;
      padding: 10px 28px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.2);
      background: transparent;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
    }

    /* ── Back link ── */
    #nr-back {
      position: fixed;
      top: 14px; left: 14px;
      z-index: 150;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,.3);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,.7);
      text-decoration: none;
      font-size: 13px;
      transition: background .2s;
    }
    #nr-back:hover { background: rgba(0,0,0,.5); color: #fff; }
  </style>
</head>
<body>

  <!-- Progress bar -->
  <div id="nr-progress-bar"></div>

  <!-- Back button -->
  <a id="nr-back" href="/news" title="Back to News"><i class="fa fa-arrow-left"></i></a>

  <!-- Desktop nav -->
  <button id="nr-nav-up" title="Previous" onclick="NR.nav(-1)"><i class="fa fa-chevron-up"></i></button>
  <button id="nr-nav-down" title="Next" onclick="NR.nav(1)"><i class="fa fa-chevron-down"></i></button>

  <!-- Reel -->
  <div id="nr-reel"></div>

  <!-- Loading -->
  <div id="nr-loading">
    <div class="nr-spinner"></div>
    <p>Loading today's news…</p>
  </div>

  <!-- Error -->
  <div id="nr-error">
    <i class="fa fa-satellite-dish"></i>
    <h2>Couldn't load news</h2>
    <p>Check your connection and try again.</p>
    <button onclick="NR.load()">Retry</button>
  </div>

  <!-- Toast -->
  <div id="nr-toast"></div>

  <script>
  const NR = {
    articles: [],
    currentIdx: 0,
    cardH: window.innerHeight,

    CATS: {
      entrance:   { label: 'Entrance Exams', color: '#e11d48', icon: 'fa-graduation-cap',
                    grad: 'linear-gradient(145deg,#7f1d1d,#1a0a0a)' },
      results:    { label: 'Results',         color: '#3b82f6', icon: 'fa-medal',
                    grad: 'linear-gradient(145deg,#1e3a8a,#0a0f1a)' },
      admissions: { label: 'Admissions',      color: '#10b981', icon: 'fa-door-open',
                    grad: 'linear-gradient(145deg,#064e3b,#0a1a14)' },
      govtjobs:   { label: 'Govt Jobs',       color: '#8b5cf6', icon: 'fa-briefcase',
                    grad: 'linear-gradient(145deg,#3b0764,#0f0a1a)' },
      scholarship:{ label: 'Scholarship',     color: '#f59e0b', icon: 'fa-star',
                    grad: 'linear-gradient(145deg,#78350f,#1a1005)' },
    },

    catInfo(key) {
      return this.CATS[key] || { label: key || 'News', color: '#64748b', icon: 'fa-newspaper',
        grad: 'linear-gradient(145deg,#1e293b,#0f0f12)' };
    },

    async load() {
      document.getElementById('nr-loading').style.display = 'flex';
      document.getElementById('nr-error').style.display = 'none';
      try {
        const res = await fetch('/api/news?limit=80&category=all');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        this.articles = data.articles || [];
        if (!this.articles.length) throw new Error('No articles');
        this.render();
        document.getElementById('nr-loading').style.display = 'none';
      } catch (e) {
        document.getElementById('nr-loading').style.display = 'none';
        document.getElementById('nr-error').style.display = 'flex';
      }
    },

    render() {
      const reel = document.getElementById('nr-reel');
      reel.innerHTML = this.articles.map((a, i) => this.cardHTML(a, i)).join('');
      this.currentIdx = 0;
      this.updateUI();

      // Scroll listener
      let ticking = false;
      reel.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(() => {
            const idx = Math.round(reel.scrollTop / window.innerHeight);
            if (idx !== this.currentIdx) {
              this.currentIdx = Math.max(0, Math.min(idx, this.articles.length - 1));
              this.updateUI();
            }
            ticking = false;
          });
          ticking = true;
        }
      }, { passive: true });

      // Keyboard nav
      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); this.nav(1); }
        if (e.key === 'ArrowUp')                     { e.preventDefault(); this.nav(-1); }
      });
    },

    cardHTML(a, i) {
      const cat = this.catInfo(a.category);
      const img = (a.image || a.image_url || '').trim();
      const hasImg = img.length > 8;
      const ago = this.timeAgo(a.date);
      const desc = this.stripHTML(a.desc || a.description || '');
      const safeTitle = (a.title || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
      const safeLink  = (a.link || '#').replace(/'/g, "\\'");

      return `
        <div class="nr-card${hasImg ? '' : ' no-img'}"
             style="--accent:${cat.color};--card-grad:${cat.grad}">

          ${hasImg ? `<div class="nr-bg" style="background-image:url('${img}')"></div>` : ''}
          <div class="nr-overlay"></div>

          <div class="nr-content">
            <!-- Top bar -->
            <div class="nr-topbar">
              <a class="nr-brand" href="/">
                <div class="nr-brand-dot"></div>
                <span class="nr-brand-text">VM News Reel</span>
              </a>
              <span class="nr-counter">${i + 1} / ${this.articles.length}</span>
            </div>

            <!-- Category -->
            <div class="nr-cat">
              <span class="nr-cat-pill" style="background:${cat.color}22;color:${cat.color};">
                <span class="nr-cat-dot" style="background:${cat.color}"></span>
                ${cat.label}
              </span>
            </div>

            <!-- Thumbnail (no-image cards only) -->
            ${hasImg ? `
              <div class="nr-thumb">
                <img src="${img}" alt="" loading="lazy"
                     onerror="this.closest('.nr-thumb').style.display='none'">
              </div>
            ` : ''}

            <!-- Bottom content -->
            <div class="nr-body">
              ${!hasImg ? `
                <div style="font-size:clamp(52px,12vw,88px);margin-bottom:18px;opacity:.18;text-align:center;">
                  <i class="fa ${cat.icon}"></i>
                </div>` : ''}
              <h2 class="nr-headline">${a.title || ''}</h2>
              ${desc ? `<p class="nr-desc">${desc}</p>` : ''}
              <div class="nr-meta">
                <i class="fa fa-circle-dot" style="font-size:6px;color:${cat.color}"></i>
                <span>${a.source || a.source_name || 'News'}</span>
                <span class="nr-meta-sep">·</span>
                <span>${ago}</span>
              </div>
              <div class="nr-actions">
                <a class="nr-btn-read" href="/news/detail/${encodeURIComponent(a.link || '')}" rel="noopener">
                  <i class="fa fa-arrow-up-right-from-square" style="font-size:12px"></i>
                  Open detailed story
                </a>
                <button class="nr-btn-icon" onclick="NR.share('${safeTitle}','${safeLink}')" title="Share">
                  <i class="fa fa-share-nodes"></i>
                </button>
                <button class="nr-btn-icon" onclick="NR.nav(1)" title="Next">
                  <i class="fa fa-chevron-up"></i>
                </button>
              </div>
            </div>

            ${i === 0 ? `
              <div class="nr-swipe-hint">
                <i class="fa fa-chevron-up"></i>
                <span>Swipe up</span>
              </div>
            ` : ''}
          </div>
        </div>`;
    },

    nav(dir) {
      const reel = document.getElementById('nr-reel');
      const next = Math.max(0, Math.min(this.currentIdx + dir, this.articles.length - 1));
      reel.scrollTo({ top: next * window.innerHeight, behavior: 'smooth' });
    },

    updateUI() {
      const a = this.articles[this.currentIdx];
      const cat = this.catInfo(a ? a.category : '');
      // Progress bar
      const bar = document.getElementById('nr-progress-bar');
      const pct = ((this.currentIdx + 1) / this.articles.length * 100).toFixed(1);
      bar.style.width = pct + '%';
      bar.style.background = cat.color;
      // Page title
      if (a) document.title = a.title ? a.title.slice(0, 60) + ' — VM News' : 'VM News Reel';
    },

    async share(title, link) {
      try {
        if (navigator.share) {
          await navigator.share({ title, url: link });
        } else {
          await navigator.clipboard.writeText(link);
          this.toast('Link copied!');
        }
      } catch { /* user cancelled */ }
    },

    toast(msg) {
      const el = document.getElementById('nr-toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2200);
    },

    timeAgo(d) {
      if (!d) return '';
      const m = Math.floor((Date.now() - new Date(d)) / 60000);
      if (m < 1)  return 'Just now';
      if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      return Math.floor(h / 24) + 'd ago';
    },

    stripHTML(s) {
      return s.replace(/<[^>]*>/g, '').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').trim();
    },
  };

  NR.load();
  </script>
</body>
</html>
