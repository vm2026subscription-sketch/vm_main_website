<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>News Reel — Vidyarthi Mitra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Latest education news — Vidyarthi Mitra News Reel">
  <meta name="theme-color" content="#0f0f12">
  <link rel="shortcut icon" href="{{ url_for('static', filename='title.png') }}" type="image/x-icon">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --flip-dur: 0.52s;
      --flip-ease: cubic-bezier(.4,0,.2,1);
    }

    html, body {
      height: 100%;
      background: #0f0f12;
      font-family: -apple-system, 'Inter', 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── Progress bar ── */
    #nr-progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      background: #e11d48;
      width: 0%;
      z-index: 300;
      transition: width .3s ease, background .4s;
    }

    /* ── Reel stage (perspective container) ── */
    #nr-reel {
      position: fixed;
      inset: 0;
      perspective: 1400px;
      perspective-origin: center center;
      overflow: hidden;
    }

    /* ── Individual cards (stacked) ── */
    .nr-card {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform-origin: center center;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      will-change: transform, opacity;
      /* inactive cards hidden behind */
      opacity: 0;
      pointer-events: none;
      z-index: 1;
    }

    .nr-card.active {
      opacity: 1;
      pointer-events: auto;
      z-index: 10;
    }

    /* ── Flip-out (going next: top half sweeps back, bottom lifts) ── */
    .nr-card.flip-out-next {
      z-index: 20;
      animation: flipOutNext var(--flip-dur) var(--flip-ease) forwards;
    }
    @keyframes flipOutNext {
      0%   { transform: rotateX(0deg);    opacity: 1; }
      40%  { transform: rotateX(-45deg);  opacity: 1; }
      100% { transform: rotateX(-92deg);  opacity: 0; }
    }

    /* ── Flip-in  (going next: next card rises from below) ── */
    .nr-card.flip-in-next {
      z-index: 15;
      animation: flipInNext var(--flip-dur) var(--flip-ease) forwards;
    }
    @keyframes flipInNext {
      0%   { transform: rotateX(92deg);  opacity: 0; }
      60%  { transform: rotateX(45deg);  opacity: 1; }
      100% { transform: rotateX(0deg);   opacity: 1; }
    }

    /* ── Flip-out (going prev: card drops down) ── */
    .nr-card.flip-out-prev {
      z-index: 20;
      animation: flipOutPrev var(--flip-dur) var(--flip-ease) forwards;
    }
    @keyframes flipOutPrev {
      0%   { transform: rotateX(0deg);   opacity: 1; }
      40%  { transform: rotateX(45deg);  opacity: 1; }
      100% { transform: rotateX(92deg);  opacity: 0; }
    }

    /* ── Flip-in (going prev: prev card falls from above) ── */
    .nr-card.flip-in-prev {
      z-index: 15;
      animation: flipInPrev var(--flip-dur) var(--flip-ease) forwards;
    }
    @keyframes flipInPrev {
      0%   { transform: rotateX(-92deg); opacity: 0; }
      60%  { transform: rotateX(-45deg); opacity: 1; }
      100% { transform: rotateX(0deg);   opacity: 1; }
    }

    /* ── Crease shadow overlay (the fold line) ── */
    #nr-crease {
      position: fixed;
      inset: 0;
      z-index: 25;
      pointer-events: none;
      opacity: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0)    0%,
        rgba(0,0,0,.55) 46%,
        rgba(0,0,0,.95) 50%,
        rgba(0,0,0,.55) 54%,
        rgba(0,0,0,0)  100%
      );
    }
    #nr-crease.show {
      animation: creaseAnim var(--flip-dur) var(--flip-ease) forwards;
    }
    @keyframes creaseAnim {
      0%   { opacity: 0; }
      35%  { opacity: 1; }
      65%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── Background image (blurred) ── */
    .nr-bg {
      position: absolute;
      inset: -10%;
      background-size: cover;
      background-position: center;
      filter: blur(28px) brightness(.3) saturate(1.4);
    }

    /* ── Gradient overlay ── */
    .nr-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,.12) 0%,
        rgba(0,0,0,.04) 28%,
        rgba(0,0,0,.5)  62%,
        rgba(0,0,0,.9)  100%
      );
    }
    .nr-card.no-img .nr-bg { display: none; }
    .nr-card.no-img .nr-overlay {
      background: var(--card-grad, linear-gradient(145deg,#1e293b,#0f0f12));
    }

    /* ── Content layer ── */
    .nr-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: env(safe-area-inset-top, 10px) 0 env(safe-area-inset-bottom, 10px);
    }

    /* ── Top bar ── */
    .nr-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
    }
    .nr-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .nr-brand-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent, #e11d48);
      animation: nr-pulse 2s infinite;
    }
    @keyframes nr-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .55; transform: scale(.75); }
    }
    .nr-brand-text {
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      letter-spacing: .3px;
    }
    .nr-counter {
      font-size: 12px;
      color: rgba(255,255,255,.5);
      font-weight: 600;
    }

    /* ── Category badge ── */
    .nr-cat { padding: 0 18px; margin-bottom: 8px; }
    .nr-cat-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px 4px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .6px;
      border: 1px solid rgba(255,255,255,.15);
      backdrop-filter: blur(8px);
    }
    .nr-cat-dot { width: 6px; height: 6px; border-radius: 50%; }

    /* ── Body ── */
    .nr-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 18px 20px;
    }
    .nr-card.no-img .nr-body {
      justify-content: center;
      padding-bottom: 80px;
    }

    .nr-big-icon {
      font-size: clamp(56px, 13vw, 96px);
      margin-bottom: 20px;
      opacity: .14;
      text-align: center;
    }

    .nr-headline {
      font-size: clamp(18px, 4.5vw, 26px);
      font-weight: 800;
      line-height: 1.26;
      color: #fff;
      margin-bottom: 10px;
      text-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    .nr-desc {
      font-size: 13.5px;
      color: rgba(255,255,255,.75);
      line-height: 1.62;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .nr-meta {
      font-size: 11.5px;
      color: rgba(255,255,255,.42);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nr-meta-sep { opacity: .4; }

    /* ── Action buttons ── */
    .nr-actions { display: flex; gap: 10px; }

    .nr-btn-read {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 13px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,.14);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      transition: background .2s;
    }
    .nr-btn-read:active { background: rgba(255,255,255,.26); }

    .nr-btn-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: rgba(255,255,255,.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.16);
      color: #fff;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .2s;
      flex-shrink: 0;
    }
    .nr-btn-icon:active { background: rgba(255,255,255,.24); }

    /* ── Swipe hint (first card) ── */
    .nr-swipe-hint {
      position: absolute;
      bottom: 100px;
      left: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: rgba(255,255,255,.4);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .4px;
      text-transform: uppercase;
      pointer-events: none;
      animation: nr-float 2.2s ease-in-out infinite;
    }
    .nr-swipe-hint i { font-size: 14px; }
    @keyframes nr-float {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-8px); }
    }

    /* ── Desktop nav arrows ── */
    #nr-nav-up, #nr-nav-down {
      position: fixed;
      right: 22px;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,.09);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.14);
      color: #fff;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      transition: background .2s;
    }
    #nr-nav-up { top: calc(50% - 52px); }
    #nr-nav-down { top: calc(50% + 8px); }
    #nr-nav-up:hover, #nr-nav-down:hover { background: rgba(255,255,255,.2); }
    @media (hover: none) { #nr-nav-up, #nr-nav-down { display: none; } }

    /* ── Toast ── */
    #nr-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(255,255,255,.1);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.16);
      color: #fff;
      padding: 9px 20px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      z-index: 400;
      opacity: 0;
      transition: all .25s;
      white-space: nowrap;
      pointer-events: none;
    }
    #nr-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Loading ── */
    #nr-loading {
      position: fixed;
      inset: 0;
      background: #0f0f12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 500;
    }
    .nr-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,.1);
      border-top-color: #e11d48;
      border-radius: 50%;
      animation: nr-spin .75s linear infinite;
    }
    @keyframes nr-spin { to { transform: rotate(360deg); } }
    #nr-loading p { color: rgba(255,255,255,.4); font-size: 13px; }

    /* ── Error ── */
    #nr-error {
      position: fixed;
      inset: 0;
      background: #0f0f12;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 500;
      text-align: center;
      padding: 32px;
    }
    #nr-error i { font-size: 40px; color: rgba(255,255,255,.2); }
    #nr-error h2 { font-size: 18px; color: rgba(255,255,255,.65); }
    #nr-error p  { font-size: 13px; color: rgba(255,255,255,.32); }
    #nr-error button {
      margin-top: 8px;
      padding: 10px 28px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.2);
      background: transparent;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
    }

    /* ── Back link ── */
    #nr-back {
      position: fixed;
      top: 14px; left: 14px;
      z-index: 200;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,.7);
      text-decoration: none;
      font-size: 13px;
      transition: background .2s;
    }
    #nr-back:hover { background: rgba(0,0,0,.55); color: #fff; }
  </style>
</head>
<body>

  <div id="nr-progress-bar"></div>
  <a id="nr-back" href="/news" title="Back to News"><i class="fa fa-arrow-left"></i></a>

  <!-- Desktop nav arrows -->
  <button id="nr-nav-up"   title="Previous" onclick="NR.nav(-1)"><i class="fa fa-chevron-up"></i></button>
  <button id="nr-nav-down" title="Next"     onclick="NR.nav(1)"><i class="fa fa-chevron-down"></i></button>

  <!-- Crease shadow (fold line effect) -->
  <div id="nr-crease"></div>

  <!-- Reel stage -->
  <div id="nr-reel"></div>

  <!-- Loading -->
  <div id="nr-loading">
    <div class="nr-spinner"></div>
    <p>Loading today's news…</p>
  </div>

  <!-- Error -->
  <div id="nr-error">
    <i class="fa fa-satellite-dish"></i>
    <h2>Couldn't load news</h2>
    <p>Check your connection and try again.</p>
    <button onclick="NR.load()">Retry</button>
  </div>

  <div id="nr-toast"></div>

  <script>
  const NR = {
    articles: [],
    currentIdx: 0,
    _busy: false,

    CATS: {
      entrance:    { label: 'Entrance Exams', color: '#e11d48', icon: 'fa-graduation-cap',
                     grad: 'linear-gradient(145deg,#7f1d1d,#1a0a0a)' },
      results:     { label: 'Results',        color: '#3b82f6', icon: 'fa-medal',
                     grad: 'linear-gradient(145deg,#1e3a8a,#0a0f1a)' },
      admissions:  { label: 'Admissions',     color: '#10b981', icon: 'fa-door-open',
                     grad: 'linear-gradient(145deg,#064e3b,#0a1a14)' },
      govtjobs:    { label: 'Govt Jobs',      color: '#8b5cf6', icon: 'fa-briefcase',
                     grad: 'linear-gradient(145deg,#3b0764,#0f0a1a)' },
      scholarship: { label: 'Scholarship',    color: '#f59e0b', icon: 'fa-star',
                     grad: 'linear-gradient(145deg,#78350f,#1a1005)' },
    },

    catInfo(key) {
      return this.CATS[key] || {
        label: key || 'News', color: '#64748b', icon: 'fa-newspaper',
        grad: 'linear-gradient(145deg,#1e293b,#0f0f12)'
      };
    },

    async load() {
      document.getElementById('nr-loading').style.display = 'flex';
      document.getElementById('nr-error').style.display = 'none';
      try {
        const res = await fetch('/api/news?limit=80&category=all');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        this.articles = data.articles || [];
        if (!this.articles.length) throw new Error('No articles');
        this.render();
        document.getElementById('nr-loading').style.display = 'none';
      } catch {
        document.getElementById('nr-loading').style.display = 'none';
        document.getElementById('nr-error').style.display = 'flex';
      }
    },

    render() {
      const reel = document.getElementById('nr-reel');
      reel.innerHTML = this.articles.map((a, i) => this.cardHTML(a, i)).join('');

      // Show first card
      reel.children[0]?.classList.add('active');
      this.currentIdx = 0;
      this.updateUI();

      // Touch swipe
      let ty0 = 0, tx0 = 0;
      reel.addEventListener('touchstart', e => {
        ty0 = e.touches[0].clientY;
        tx0 = e.touches[0].clientX;
      }, { passive: true });
      reel.addEventListener('touchend', e => {
        const dy = ty0 - e.changedTouches[0].clientY;
        const dx = Math.abs(tx0 - e.changedTouches[0].clientX);
        if (Math.abs(dy) > 40 && Math.abs(dy) > dx) this.nav(dy > 0 ? 1 : -1);
      }, { passive: true });

      // Mouse wheel (desktop)
      let wheelLock = false;
      window.addEventListener('wheel', e => {
        if (wheelLock) return;
        wheelLock = true;
        this.nav(e.deltaY > 0 ? 1 : -1);
        setTimeout(() => wheelLock = false, 750);
      }, { passive: true });

      // Keyboard
      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); this.nav(1);  }
        if (e.key === 'ArrowUp')                     { e.preventDefault(); this.nav(-1); }
      });
    },

    cardHTML(a, i) {
      const cat     = this.catInfo(a.category);
      const img     = (a.image || a.image_url || '').trim();
      const hasImg  = img.length > 8;
      const ago     = this.timeAgo(a.date);
      const desc    = this.stripHTML(a.desc || a.description || '');
      const safeT   = (a.title || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
      const safeL   = (a.link  || '#').replace(/'/g, "\\'");

      return `
        <div class="nr-card${hasImg ? '' : ' no-img'}"
             style="--accent:${cat.color};--card-grad:${cat.grad}">

          ${hasImg ? `<div class="nr-bg" style="background-image:url('${img}')"></div>` : ''}
          <div class="nr-overlay"></div>

          <div class="nr-content">
            <div class="nr-topbar">
              <a class="nr-brand" href="/">
                <div class="nr-brand-dot"></div>
                <span class="nr-brand-text">VM News Reel</span>
              </a>
              <span class="nr-counter">${i + 1} / ${this.articles.length}</span>
            </div>

            <div class="nr-cat">
              <span class="nr-cat-pill" style="background:${cat.color}22;color:${cat.color};">
                <span class="nr-cat-dot" style="background:${cat.color}"></span>
                ${cat.label}
              </span>
            </div>

            <div class="nr-body">
              ${!hasImg ? `<div class="nr-big-icon"><i class="fa ${cat.icon}"></i></div>` : ''}
              <h2 class="nr-headline">${a.title || ''}</h2>
              ${desc ? `<p class="nr-desc">${desc}</p>` : ''}
              <div class="nr-meta">
                <i class="fa fa-circle-dot" style="font-size:6px;color:${cat.color}"></i>
                <span>${a.source || 'News'}</span>
                <span class="nr-meta-sep">·</span>
                <span>${ago}</span>
              </div>
              <div class="nr-actions">
                <a class="nr-btn-read" href="${a.link || '#'}" target="_blank" rel="noopener">
                  <i class="fa fa-arrow-up-right-from-square" style="font-size:12px"></i>
                  Read Full Article
                </a>
                <button class="nr-btn-icon" onclick="NR.share('${safeT}','${safeL}')" title="Share">
                  <i class="fa fa-share-nodes"></i>
                </button>
                <button class="nr-btn-icon" onclick="NR.nav(1)" title="Next">
                  <i class="fa fa-chevron-up"></i>
                </button>
              </div>
            </div>

            ${i === 0 ? `
              <div class="nr-swipe-hint">
                <i class="fa fa-chevron-up"></i>
                <span>Swipe up</span>
              </div>` : ''}
          </div>
        </div>`;
    },

    nav(dir) {
      if (this._busy) return;
      const next = this.currentIdx + dir;
      if (next < 0 || next >= this.articles.length) return;

      this._busy = true;

      const cards      = document.querySelectorAll('.nr-card');
      const curCard    = cards[this.currentIdx];
      const nextCard   = cards[next];
      const crease     = document.getElementById('nr-crease');

      const outClass = dir > 0 ? 'flip-out-next' : 'flip-out-prev';
      const inClass  = dir > 0 ? 'flip-in-next'  : 'flip-in-prev';
      const DUR_MS   = 520;

      // Start crease shadow
      crease.classList.remove('show');
      void crease.offsetWidth;           // force reflow to restart animation
      crease.classList.add('show');

      // Exit current card
      curCard.classList.remove('active');
      curCard.classList.add(outClass);

      // Enter next card (stagger slightly so exit leads)
      nextCard.classList.add(inClass);

      setTimeout(() => {
        curCard.classList.remove(outClass);
        nextCard.classList.remove(inClass);
        nextCard.classList.add('active');
        crease.classList.remove('show');
        this.currentIdx = next;
        this._busy = false;
        this.updateUI();
      }, DUR_MS);
    },

    updateUI() {
      const a   = this.articles[this.currentIdx];
      const cat = this.catInfo(a ? a.category : '');
      const bar = document.getElementById('nr-progress-bar');
      bar.style.width      = ((this.currentIdx + 1) / this.articles.length * 100).toFixed(1) + '%';
      bar.style.background = cat.color;
      if (a) document.title = (a.title || '').slice(0, 60) + ' — VM News';
    },

    async share(title, link) {
      try {
        if (navigator.share) { await navigator.share({ title, url: link }); }
        else { await navigator.clipboard.writeText(link); this.toast('Link copied!'); }
      } catch { /* cancelled */ }
    },

    toast(msg) {
      const el = document.getElementById('nr-toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2200);
    },

    timeAgo(d) {
      if (!d) return '';
      const m = Math.floor((Date.now() - new Date(d)) / 60000);
      if (m < 1)  return 'Just now';
      if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      return Math.floor(h / 24) + 'd ago';
    },

    stripHTML(s) {
      return (s || '').replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&').trim();
    },
  };

  NR.load();
  </script>
</body>
