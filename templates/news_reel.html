<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>News Reel — Vidyarthi Mitra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Latest education news — Vidyarthi Mitra News Reel">
  <meta name="theme-color" content="#08080d">
  <link rel="shortcut icon" href="{{ url_for('static', filename='title.png') }}" type="image/x-icon">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height: 100%;
      background: #08080d;
      font-family: -apple-system,'Inter','Segoe UI',system-ui,sans-serif;
      overflow: hidden;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Progress bar ── */
    #nr-bar {
      position: fixed; top:0; left:0; height:3px; width:0%;
      z-index: 300;
      transition: width .35s ease, background .4s;
    }

    /* ── Reel ── */
    #nr-reel {
      width: 100%;
      height: 100vh;
      height: 100svh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #nr-reel::-webkit-scrollbar { display: none; }

    /* ── Card ── */
    .nr-card {
      width: 100%;
      height: 100vh;
      height: 100svh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #08080d;
    }

    /* Blurred full-bleed background */
    .nr-bg {
      position: absolute;
      inset: -24px;
      background-size: cover;
      background-position: center;
      filter: blur(44px) brightness(.22) saturate(1.7);
      will-change: transform;
    }
    .nr-card.no-img .nr-bg { display: none; }

    /* Category gradient (no-img only) */
    .nr-grad-bg {
      position: absolute;
      inset: 0;
      opacity: 0;
    }
    .nr-card.no-img .nr-grad-bg {
      opacity: 1;
      background: var(--card-grad);
    }

    /* Dark vignette on top of everything */
    .nr-vignette {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,.06)  0%,
        rgba(0,0,0,.0)  20%,
        rgba(0,0,0,.45) 58%,
        rgba(0,0,0,.88) 80%,
        rgba(0,0,0,.97) 100%
      );
    }
    .nr-card.no-img .nr-vignette {
      background: linear-gradient(
        180deg,
        rgba(0,0,0,.15) 0%,
        rgba(0,0,0,.0)  20%,
        rgba(0,0,0,.65) 62%,
        rgba(0,0,0,.95) 100%
      );
    }

    /* Giant watermark icon (no-img) */
    .nr-watermark {
      position: absolute;
      right: -28px; top: 50%;
      transform: translateY(-60%) rotate(-12deg);
      font-size: clamp(180px, 42vw, 260px);
      color: rgba(255,255,255,.04);
      pointer-events: none;
      line-height: 1;
    }

    /* ── Content layer ── */
    .nr-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      height: 100%;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── Top bar ── */
    .nr-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 0;
    }
    .nr-brand {
      display: flex; align-items: center; gap: 9px;
      text-decoration: none;
    }
    .nr-live-dot {
      position: relative;
      width: 9px; height: 9px;
    }
    .nr-live-dot::before,
    .nr-live-dot::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }
    .nr-live-dot::before {
      background: var(--accent, #e11d48);
    }
    .nr-live-dot::after {
      background: var(--accent, #e11d48);
      animation: liveRipple 2s ease-out infinite;
    }
    @keyframes liveRipple {
      0%   { transform: scale(1);   opacity: .7; }
      100% { transform: scale(2.8); opacity: 0; }
    }
    .nr-brand-text {
      font-size: 13px; font-weight: 800; color: #fff; letter-spacing: .4px;
    }
    .nr-counter {
      display: flex; align-items: baseline; gap: 2px;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.1);
      font-size: 13px; font-weight: 700; color: rgba(255,255,255,.75);
    }
    .nr-counter small { font-size: 10px; color: rgba(255,255,255,.38); }

    /* ── Image card (rounded panel for actual photo) ── */
    .nr-img-wrap {
      margin: 14px 16px 0;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      height: 36vh;
      background: rgba(255,255,255,.06);
    }
    .nr-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .nr-img-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 55%, rgba(0,0,0,.5) 100%);
      border-radius: 18px;
    }
    .nr-card.no-img .nr-img-wrap { display: none; }

    /* Spacer pushes content to bottom */
    .nr-spacer { flex: 1; }

    /* ── Bottom content panel ── */
    .nr-bottom {
      padding: 12px 20px 20px;
    }

    /* Source row */
    .nr-source-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
    }
    .nr-source-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px 3px 8px;
      border-radius: 20px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.08);
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,.65);
    }
    .nr-source-chip i {
      font-size: 8px;
      color: var(--accent, #e11d48);
    }
    .nr-ago {
      font-size: 11px; color: rgba(255,255,255,.36);
    }

    /* Category badge */
    .nr-cat-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 14px 6px 10px;
      border-radius: 24px;
      background: color-mix(in srgb, var(--accent) 14%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
      color: var(--accent, #e11d48);
      font-size: 10.5px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .7px;
      margin-bottom: 10px;
      align-self: flex-start;
      box-shadow: 0 2px 18px color-mix(in srgb, var(--accent) 22%, transparent);
    }
    .nr-cat-badge i { font-size: 11px; }

    /* Headline */
    .nr-headline {
      font-size: clamp(19px, 4.8vw, 27px);
      font-weight: 800;
      line-height: 1.22;
      color: #fff;
      letter-spacing: -.25px;
      margin-bottom: 8px;
      text-shadow: 0 2px 16px rgba(0,0,0,.5);
    }

    /* Description */
    .nr-desc {
      font-size: 13.5px;
      color: rgba(255,255,255,.62);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 16px;
    }

    /* Actions */
    .nr-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .nr-btn-read {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 18px;
      border-radius: 14px;
      background: var(--accent, #e11d48);
      color: #fff;
      font-size: 13.5px; font-weight: 700;
      text-decoration: none;
      box-shadow: 0 4px 22px color-mix(in srgb, var(--accent) 48%, transparent);
      transition: opacity .18s, transform .12s;
      border: none;
    }
    .nr-btn-read:active { opacity: .82; transform: scale(.97); }
    .nr-btn-read i { font-size: 11px; }

    .nr-btn-round {
      width: 50px; height: 50px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.09);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .18s, transform .12s;
      flex-shrink: 0;
    }
    .nr-btn-round:active { background: rgba(255,255,255,.22); transform: scale(.91); }

    /* Swipe hint (first card) */
    .nr-swipe-hint {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 106px);
      left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      color: rgba(255,255,255,.38);
      font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
      pointer-events: none;
      animation: hintFloat 2s ease-in-out infinite;
    }
    .nr-swipe-hint i { font-size: 13px; }
    @keyframes hintFloat {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(-8px); }
    }

    /* ── Desktop nav ── */
    #nr-nav-up, #nr-nav-down {
      position: fixed; right: 20px;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.12);
      color: #fff; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 100;
      transition: background .2s;
    }
    #nr-nav-up  { top: calc(50% - 54px); }
    #nr-nav-down{ top: calc(50% + 10px); }
    #nr-nav-up:hover, #nr-nav-down:hover { background: rgba(255,255,255,.18); }
    @media (hover: none) { #nr-nav-up, #nr-nav-down { display: none; } }

    /* ── Toast ── */
    #nr-toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(20,20,28,.9);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.12);
      color: #fff; padding: 10px 22px;
      border-radius: 28px; font-size: 13px; font-weight: 600;
      z-index: 400; opacity: 0; transition: all .22s;
      white-space: nowrap; pointer-events: none;
    }
    #nr-toast.show { opacity:1; transform: translateX(-50%) translateY(0); }

    /* ── Loading ── */
    #nr-loading {
      position: fixed; inset: 0; background: #08080d;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px; z-index: 500;
    }
    .nr-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,.08);
      border-top-color: #e11d48;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #nr-loading p { font-size: 13px; color: rgba(255,255,255,.38); letter-spacing: .3px; }

    /* ── Error ── */
    #nr-error {
      position: fixed; inset: 0; background: #08080d;
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      z-index: 500; text-align: center; padding: 32px;
    }
    #nr-error i   { font-size: 44px; color: rgba(255,255,255,.15); }
    #nr-error h2  { font-size: 18px; color: rgba(255,255,255,.6); }
    #nr-error p   { font-size: 13px; color: rgba(255,255,255,.3); }
    #nr-error button {
      margin-top: 10px; padding: 11px 32px;
      border-radius: 28px; border: 1px solid rgba(255,255,255,.18);
      background: transparent; color: #fff; font-size: 13px; cursor: pointer;
    }

    /* ── Back button ── */
    #nr-back {
      position: fixed; top: 14px; left: 14px; z-index: 200;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(0,0,0,.4); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.1);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,.65); text-decoration: none; font-size: 13px;
      transition: background .2s;
    }
    #nr-back:hover { background: rgba(0,0,0,.6); color: #fff; }
  </style>
</head>
<body>

  <div id="nr-bar"></div>
  <a id="nr-back" href="/news-reel" title="Back"><i class="fa fa-arrow-left"></i></a>

  <button id="nr-nav-up"   onclick="NR.nav(-1)" title="Previous"><i class="fa fa-chevron-up"></i></button>
  <button id="nr-nav-down" onclick="NR.nav(1)"  title="Next"><i class="fa fa-chevron-down"></i></button>

  <div id="nr-reel"></div>

  <div id="nr-loading">
    <div class="nr-spinner"></div>
    <p>Loading today's news…</p>
  </div>

  <div id="nr-error">
    <i class="fa fa-satellite-dish"></i>
    <h2>Couldn't load news</h2>
    <p>Check your connection and try again.</p>
    <button onclick="NR.load()">Retry</button>
  </div>

  <div id="nr-toast"></div>

  <script>
  const NR = {
    articles: [],
    currentIdx: 0,

    CATS: {
      entrance:    { label:'Entrance Exams', color:'#f43f5e', icon:'fa-graduation-cap',
                     grad:'linear-gradient(145deg,#881337 0%,#1a0a0e 100%)' },
      results:     { label:'Results',        color:'#60a5fa', icon:'fa-medal',
                     grad:'linear-gradient(145deg,#1e3a8a 0%,#060c1a 100%)' },
      admissions:  { label:'Admissions',     color:'#34d399', icon:'fa-door-open',
                     grad:'linear-gradient(145deg,#065f46 0%,#061412 100%)' },
      govtjobs:    { label:'Govt Jobs',      color:'#a78bfa', icon:'fa-briefcase',
                     grad:'linear-gradient(145deg,#4c1d95 0%,#0d0616 100%)' },
      scholarship: { label:'Scholarship',    color:'#fbbf24', icon:'fa-star',
                     grad:'linear-gradient(145deg,#92400e 0%,#18100a 100%)' },
    },

    catInfo(key) {
      return this.CATS[key] || {
        label: key || 'News', color: '#94a3b8', icon: 'fa-newspaper',
        grad: 'linear-gradient(145deg,#1e293b,#08080d)'
      };
    },

    async load() {
      document.getElementById('nr-loading').style.display = 'flex';
      document.getElementById('nr-error').style.display   = 'none';
      try {
        const res = await fetch('/api/news?limit=80&category=all');
        if (!res.ok) throw new Error();
        const data = await res.json();
        this.articles = data.articles || [];
        if (!this.articles.length) throw new Error();
        this.render();
        document.getElementById('nr-loading').style.display = 'none';
      } catch {
        document.getElementById('nr-loading').style.display = 'none';
        document.getElementById('nr-error').style.display   = 'flex';
      }
    },

    render() {
      const reel = document.getElementById('nr-reel');
      reel.innerHTML = this.articles.map((a, i) => this.cardHTML(a, i)).join('');
      this.currentIdx = 0;
      this.updateUI();

      /* Scroll → update counter + progress */
      let tick = false;
      reel.addEventListener('scroll', () => {
        if (tick) return;
        tick = true;
        requestAnimationFrame(() => {
          const idx = Math.round(reel.scrollTop / reel.clientHeight);
          if (idx !== this.currentIdx) {
            this.currentIdx = Math.max(0, Math.min(idx, this.articles.length - 1));
            this.updateUI();
          }
          tick = false;
        });
      }, { passive: true });

      /* Keyboard */
      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); this.nav(1);  }
        if (e.key === 'ArrowUp')                     { e.preventDefault(); this.nav(-1); }
      });
    },

    cardHTML(a, i) {
      const cat    = this.catInfo(a.category);
      const img    = (a.image || a.image_url || '').trim();
      const hasImg = img.length > 8;
      const ago    = this.timeAgo(a.date);
      const desc   = this.stripHTML(a.desc || a.description || '');
      const safeT  = (a.title || '').replace(/'/g,"\\'" ).replace(/"/g,'&quot;');
      const safeL  = (a.link  || '#').replace(/'/g,"\\'" );
      const n      = i + 1;
      const total  = this.articles.length;

      return `
      <div class="nr-card${hasImg ? '' : ' no-img'}"
           style="--accent:${cat.color};--card-grad:${cat.grad}">

        ${hasImg ? `<div class="nr-bg" style="background-image:url('${img}')"></div>` : ''}
        <div class="nr-grad-bg"></div>
        <div class="nr-vignette"></div>
        ${!hasImg ? `<div class="nr-watermark"><i class="fa ${cat.icon}"></i></div>` : ''}

        <div class="nr-content">

          <!-- top bar -->
          <div class="nr-topbar">
            <a class="nr-brand" href="/">
              <span class="nr-live-dot"></span>
              <span class="nr-brand-text">VM News Reel</span>
            </a>
            <span class="nr-counter">${n}<small> / ${total}</small></span>
          </div>

          <!-- image panel -->
          ${hasImg ? `
          <div class="nr-img-wrap">
            <img src="${img}" alt="" loading="lazy"
                 onerror="this.closest('.nr-img-wrap').style.display='none'">
          </div>` : ''}

          <div class="nr-spacer"></div>

          <!-- bottom content -->
          <div class="nr-bottom">

            <div class="nr-source-row">
              <span class="nr-source-chip">
                <i class="fa fa-circle-dot"></i>
                ${a.source || 'News'}
              </span>
              <span class="nr-ago">${ago}</span>
            </div>

            <div class="nr-cat-badge">
              <i class="fa ${cat.icon}"></i>
              ${cat.label}
            </div>

            <h2 class="nr-headline">${a.title || ''}</h2>
            ${desc ? `<p class="nr-desc">${desc}</p>` : ''}

            <div class="nr-actions">
              <a class="nr-btn-read" href="${a.link || '#'}" target="_blank" rel="noopener">
                <i class="fa fa-arrow-up-right-from-square"></i>
                Read Full Article
              </a>
              <button class="nr-btn-round" onclick="NR.share('${safeT}','${safeL}')" title="Share">
                <i class="fa fa-share-nodes"></i>
              </button>
              <button class="nr-btn-round" onclick="NR.nav(1)" title="Next">
                <i class="fa fa-chevron-up"></i>
              </button>
            </div>

          </div>

          ${i === 0 ? `
          <div class="nr-swipe-hint">
            <i class="fa fa-chevron-up"></i>
            <span>Swipe up</span>
          </div>` : ''}

        </div>
      </div>`;
    },

    nav(dir) {
      const reel = document.getElementById('nr-reel');
      const next = Math.max(0, Math.min(this.currentIdx + dir, this.articles.length - 1));
      reel.scrollTo({ top: next * reel.clientHeight, behavior: 'smooth' });
    },

    updateUI() {
      const a   = this.articles[this.currentIdx];
      const cat = this.catInfo(a ? a.category : '');
      const bar = document.getElementById('nr-bar');
      bar.style.width      = ((this.currentIdx + 1) / this.articles.length * 100).toFixed(1) + '%';
      bar.style.background = cat.color;
      if (a) document.title = (a.title || '').slice(0, 60) + ' — VM News';
    },

    async share(title, link) {
      try {
        if (navigator.share) await navigator.share({ title, url: link });
        else { await navigator.clipboard.writeText(link); this.toast('Link copied!'); }
      } catch { /* cancelled */ }
    },

    toast(msg) {
      const el = document.getElementById('nr-toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2200);
    },

    timeAgo(d) {
      if (!d) return '';
      const m = Math.floor((Date.now() - new Date(d)) / 60000);
      if (m < 1)  return 'Just now';
      if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      return Math.floor(h / 24) + 'd ago';
    },

    stripHTML(s) {
      return (s||'').replace(/<[^>]*>/g,'').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').trim();
    },
  };

  NR.load();
  </script>
</body>
</html>
