<!DOCTYPE html>
<html>
<head>
    <title>News API Test</title>
</head>
<body>
    <h1>News API Test</h1>
    <p id="status">Loading...</p>
    <pre id="output"></pre>

    <script>
        async function testFetchNews() {
            try {
                console.log('Test: Fetching from /api/news...');
                document.getElementById('status').textContent = 'Fetching from /api/news...';
                
                const response = await fetch('/api/news?limit=2');
                console.log('Test: Response status:', response.status);
                console.log('Test: Response ok:', response.ok);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Test: Data received:', data);
                
                let output = 'API Response:\n' + JSON.stringify(data, null, 2);
                document.getElementById('output').textContent = output;
                document.getElementById('status').textContent = `Success! Got ${data.articles.length} articles`;
                
            } catch (error) {
                console.error('Test: Error:', error);
                document.getElementById('status').textContent = `Error: ${error.message}`;
                document.getElementById('output').textContent = error.toString();
            }
        }
        
        // Run on page load
        window.addEventListener('DOMContentLoaded', testFetchNews);
    </script>
</body>
</html>
