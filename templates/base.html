<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vidyarthi Mitra{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='title.png') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #ff6600; --text: #2f2f2f; --muted: #6b7280; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Roboto', sans-serif; color: var(--text); background: #fff; }
        a,
        a:hover,
        a:focus,
        a:active,
        a:visited {
            text-decoration: none !important;
        }
        .site-header {
            position: sticky;
            top: 0;
            z-index: 1200;
            background: #fff;
            border-bottom: 1px solid #ececec;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }
        .site-nav-wrap {
            max-width: 1320px;
            margin: 0 auto;
            min-height: 78px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .brand {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }
        .brand img { height: 46px; width: auto; display: block; }
        .site-nav {
            margin-left: auto;
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: 0;
        }
        .site-nav a {
            text-decoration: none;
            color: #3f3f3f;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 28px 12px 24px;
            border-radius: 0;
            transition: color 0.22s ease;
            position: relative;
            white-space: nowrap;
            line-height: 1;
        }
        .site-nav a::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: 0;
            width: 0;
            height: 3px;
            border-radius: 99px;
            background: var(--orange);
            transform: translateX(-50%);
            transition: width 0.22s ease;
        }
        .site-nav a:hover,
        .site-nav a.active {
            color: var(--orange);
            background: transparent;
        }
        .site-nav a:hover::after,
        .site-nav a.active::after {
            width: 100%;
        }
        .site-nav a.nav-home {
            font-size: 20px;
            padding-left: 14px;
            padding-right: 14px;
        }
        .site-nav a.nav-search {
            font-size: 16px;
            padding-left: 10px;
            padding-right: 4px;
            margin-left: 4px;
        }
        .badge-new {
            background: #ffcc4d;
            color: #111;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 700;
            margin-left: 6px;
            vertical-align: middle;
        }
        .site-main { min-height: calc(100vh - 140px); }
        .site-footer {
            background: #1f2738;
            color: #c9d4e2;
            margin-top: 30px;
        }
        .site-footer .footer-inner {
            max-width: 1240px;
            margin: 0 auto;
            padding: 18px 16px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 13px;
        }
        .site-footer a { color: #ff8a33; text-decoration: none; }
        .site-footer a:hover { color: #fff; }
        @media (max-width: 900px) {
            .site-nav-wrap { align-items: flex-start; flex-direction: column; padding: 10px 14px 14px; }
            .site-nav { margin-left: 0; width: 100%; flex-wrap: wrap; }
            .site-nav a { padding: 10px 10px; font-size: 12px; }
            .site-nav a::after { display: none; }
            .site-nav a.nav-home,
            .site-nav a.nav-search { font-size: 12px; padding: 10px; margin-left: 0; }
            .brand img { height: 40px; }
        }
    </style>
    {% block page_styles %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="site-nav-wrap">
            <a class="brand" href="{{ url_for('index') }}">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Vidyarthi Mitra">
            </a>
            <nav class="site-nav">
                <a href="{{ url_for('index') }}" class="nav-home {% if request.endpoint == 'index' %}active{% endif %}"><i class="fa fa-home"></i></a>
                <a href="{{ url_for('universities') }}" class="{% if request.endpoint == 'universities' %}active{% endif %}">Universities</a>
                <a href="{{ url_for('colleges') }}" class="{% if request.endpoint == 'colleges' %}active{% endif %}">Colleges</a>
                <a href="{{ url_for('courses') }}" class="{% if request.endpoint == 'courses' %}active{% endif %}">Courses</a>
                <a href="{{ url_for('exams') }}" class="{% if request.endpoint == 'exams' %}active{% endif %}">Entrance Exams</a>
                <a href="{{ url_for('mock_exams') }}" class="{% if request.endpoint == 'mock_exams' %}active{% endif %}">Mock Exams</a>
                <a href="{{ url_for('cutoffs') }}" class="{% if request.endpoint == 'cutoffs' %}active{% endif %}">Cut-Offs</a>
                <a href="{{ url_for('fyjc_rank') }}" class="{% if request.endpoint == 'fyjc_rank' %}active{% endif %}">FYJC Rank</a>
                <a href="{{ url_for('admissions') }}" class="{% if request.endpoint == 'admissions' %}active{% endif %}">Admissions</a>
                <a href="{{ url_for('news') }}" class="{% if request.endpoint == 'news' %}active{% endif %}">News</a>
                <a href="{{ url_for('epaper') }}" class="{% if request.endpoint == 'epaper' %}active{% endif %}">Epaper<span class="badge-new">New</span></a>
                <a href="{{ url_for('guide_me') }}" class="{% if request.endpoint == 'guide_me' %}active{% endif %}">Guide Me</a>
                <a href="javascript:void(0)" class="nav-search"><i class="fa fa-search"></i></a>
            </nav>
        </div>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div>© 2026 VidyarthiMitra.org - All Rights Reserved</div>
            <div><a href="{{ url_for('refund_policy') }}">Refund & Cancellation</a></div>
        </div>
    </footer>

    {% block page_scripts %}{% endblock %}
</body>
</html>
