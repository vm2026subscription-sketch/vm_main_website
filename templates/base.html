<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vidyarthi Mitra{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}VidyarthiMitra.org — India's trusted educational guidance portal for students. College predictor, entrance exams, admissions, career guidance and more.{% endblock %}">
    <meta name="keywords" content="{% block meta_keywords %}vidyarthi mitra, college predictor, MHT-CET, JEE, NEET, admissions, Maharashtra colleges, entrance exams, career guidance{% endblock %}">
    <meta name="robots" content="index, follow">
    <meta name="author" content="VidyarthiMitra.org">
    <link rel="canonical" href="{{ request.url }}">
    <!-- Open Graph -->
    <meta property="og:site_name" content="VidyarthiMitra.org">
    <meta property="og:title" content="{% block og_title %}{% block _og_title_inner %}Vidyarthi Mitra — India's Educational Guidance Portal{% endblock %}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}VidyarthiMitra.org — College predictor, entrance exam info, admissions guidance, and career counselling for Indian students.{% endblock %}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:image" content="{{ url_for('static', filename='logo.png', _external=True) }}">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}Vidyarthi Mitra — India's Educational Guidance Portal{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}College predictor, entrance exams, admissions, and career guidance for Indian students.{% endblock %}">
    <meta name="twitter:image" content="{{ url_for('static', filename='logo.png', _external=True) }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='title.png') }}">
    <!-- preconnect so DNS+TLS is resolved before stylesheets load -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Bootstrap: load async, apply on load (avoids render-blocking) -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/3.3.7/css/bootstrap.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/3.3.7/css/bootstrap.min.css"></noscript>
    <!-- Font Awesome: load async -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"></noscript>
    <!-- Google Fonts: load async -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"></noscript>
    <style>
        :root { --orange: #ff6600; --text: #2f2f2f; --muted: #6b7280; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Roboto', sans-serif; color: var(--text); background: #fff; overflow-x: hidden; }
        a,
        a:hover,
        a:focus,
        a:active,
        a:visited {
            text-decoration: none !important;
        }
        .site-main { min-height: calc(100vh - 140px); }
        .site-footer {
            background: #1f2738;
            color: #c9d4e2;
            margin-top: 30px;
        }
        .site-footer .footer-inner {
            max-width: 1240px;
            margin: 0 auto;
            padding: 18px 16px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 13px;
            align-items: center;
        }
        .site-footer .footer-links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .site-footer a { color: #ff8a33; text-decoration: none; }
        .site-footer a:hover { color: #fff; }
    </style>
    {% block page_styles %}{% endblock %}
</head>
<body>
    {% include '_shared_index_navbar.html' %}

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div>&copy; 2026 VidyarthiMitra.org - All Rights Reserved</div>
            <div class="footer-links">
                <a href="{{ url_for('about_us') }}">About Us</a>
                <a href="{{ url_for('contact') }}">Contact Us</a>
                <a href="{{ url_for('privacy') }}">Privacy Policy</a>
                <a href="{{ url_for('terms') }}">Terms &amp; Conditions</a>
                <a href="{{ url_for('refund_policy') }}">Refund &amp; Cancellation</a>
            </div>
        </div>
    </footer>

    {% block page_scripts %}{% endblock %}
</body>
</html>
